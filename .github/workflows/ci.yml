name: Deploy Configuration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Validate docker-compose.yml
        run: |
          docker-compose -f is-stack/docker-compose.yml config
      - name: Check files exist
        run: |
          ls -la is-stack/
          test -f is-stack/docker-compose.yml
          test -f is-stack/.env.example
