name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore
        run: dotnet restore IsLabApp.csproj  # ← Укажите правильный путь!
      
      - name: Build
        run: dotnet build IsLabApp.csproj --no-restore
      
      - name: Test
        run: dotnet test IsLabApp.Tests/IsLabApp.Tests.csproj --no-build
